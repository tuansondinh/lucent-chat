name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
        os: [ubuntu-latest]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run main tests
      run: |
        cd studio
        npm run test:main

    - name: Run renderer tests
      run: |
        cd studio
        npm run test:renderer

    - name: Run coverage
      run: |
        cd studio
        npm run test:coverage
      continue-on-error: false

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./studio/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  smoke-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
        os: [ubuntu-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run smoke tests
      run: |
        cd studio
        npm run test:smoke
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test, smoke-tests]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Build the app
      run: |
        cd studio
        npm run build

    - name: Test app build
      run: |
        cd studio
        # Verify dist directory exists and contains expected files
        if [ ! -d "dist" ]; then
          echo "Error: dist directory not found"
          exit 1
        fi
        if [ ! -f "dist/main/index.js" ]; then
          echo "Error: main bundle not found"
          exit 1
        fi