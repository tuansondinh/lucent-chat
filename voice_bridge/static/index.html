// ---------------------------------------------------------------------------
// Audio playback (24kHz Int16LE from server)
// ---------------------------------------------------------------------------

function handleAudioData(buffer) {
  if (audioOffMode) {
    return;
  }

  playbackQueue.push(buffer);

  // Start playing after jitter buffer fills or TTS ended
  if (!isPlayingAudio) {
    const totalBytes = playbackQueue.reduce((s, b) => s + b.byteLength, 0);
    const totalMs = (totalBytes / 2) / PLAYBACK_RATE * 1000;

    if (totalMs >= JITTER_BUFFER_MS || !isTTSPlaying) {
      playBufferedAudio();
    }
  }
}

function playBufferedAudio() {
  if (playbackQueue.length === 0) {
    isPlayingAudio = false;
    return;
  }

  isPlayingAudio = true;

  if (!audioCtxPlayback || audioCtxPlayback.state === 'closed') {
    audioCtxPlayback = new AudioContext({ sampleRate: PLAYBACK_RATE });
  }
  // iOS Safari suspends AudioContext created without user gesture — resume it
  if (audioCtxPlayback.state === 'suspended') {
    audioCtxPlayback.resume();
  }

  // Merge all queued buffers
  const totalLen = playbackQueue.reduce((s, b) => s + b.byteLength, 0) / 2;
  const merged = new Float32Array(totalLen);
  let offset = 0;
  for (const buf of playbackQueue) {
    const int16 = new Int16Array(buf);
    for (let i = 0; i < int16.length; i++) {
      merged[offset++] = int16[i] / 32768;
    }
  }
  playbackQueue = [];

  const audioBuffer = audioCtxPlayback.createBuffer(1, merged.length, PLAYBACK_RATE);
  audioBuffer.getChannelData(0).set(merged);

  const source = audioCtxPlayback.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtxPlayback.destination);
  source.onended = () => {
    activeSource = null;
    // Play next batch if available
    if (playbackQueue.length > 0) {
      playBufferedAudio();
    } else {
      isPlayingAudio = false;
      // If TTS has fully ended (server sent tts_end) and the queue is now
      // empty, all audio has been played — notify server and resume mic.
      if (!isTTSPlaying) {
        onPlaybackComplete();
      }
    }
  };
  activeSource = source;
  source.start();
}

function stopTTS() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'stop_tts' }));
  }
  abortCurrentResponseUI();
  // Stop the currently playing audio source
  if (activeSource) {
    try { activeSource.stop(); } catch(e) {}
    activeSource = null;
  }
  playbackQueue = [];
  isPlayingAudio = false;
  isTTSPlaying = false;
  stopBtn.classList.remove('visible');
  onPlaybackComplete();
}

/**
 * Called when all TTS audio has finished playing back on the client.
 * Notifies the server that playback is complete, updates UI, and resumes
 * the mic in always-on mode so the user can speak again.
 */
function onPlaybackComplete() {
  // Notify server — it uses this to know the client is ready for next input.
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'playback_done' }));
  }

  stopBtn.classList.remove('visible');
  setSendButtonBusy(false);
  updatePushVoiceButtonState();

  // Notify if tab is hidden and no queued message waiting
  if (!queuedMessage) notifyIfHidden('Claude has finished responding');

  // Drain any queued message first — if drained, skip normal post-response UI
  if (drainQueueIfIdle()) return;

  focusTextInputIfVisible();
  setStatus('connected', 'Connected');

  if (alwaysOnMode && !textMode) {
    hint.textContent = 'Speak now — say Stop to interrupt';
    startRecording();
  } else {
    hint.textContent = 'Tap mic to speak';
  }
}

function updateScrollDownButton() {
  scrollDownBtn.classList.toggle('visible', userScrolledUp && newContentArrived);
}

function scrollToBottom() {
  chat.scrollTop = chat.scrollHeight;
  userScrolledUp = false;
  newContentArrived = false;
  updateScrollDownButton();
}

function scrollIfAtBottom() {
  if (userScrolledUp) {
    newContentArrived = true;
    updateScrollDownButton();
    return;
  }
  scrollToBottom();
}

function showReconnectBanner(html, mode = 'loading') {
  reconnectBanner.classList.toggle('manual', mode === 'manual');
  reconnectBanner.innerHTML = `
    <div class="reconnect-banner-row">${html}</div>
    <div class="reconnect-progress"><span class="reconnect-progress-bar"></span></div>
  `;
  reconnectBanner.classList.add('visible');
}

function hideReconnectBanner() {
  reconnectBanner.classList.remove('manual');
  reconnectBanner.classList.remove('visible');
  reconnectBanner.innerHTML = '';
}

function showReconnectToast() {
  reconnectToast.classList.add('visible');
  clearTimeout(reconnectToastTimer);
  reconnectToastTimer = setTimeout(() => {
    reconnectToast.classList.remove('visible');
  }, 2000);
}

function manualReconnect() {
  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
  reconnectAttempts = 0;
  hideReconnectBanner();
  connect();
}

function formatTimestamp(date = new Date()) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function getLastChatMessage() {
  return Array.from(chat.querySelectorAll('.message'))
    .filter((el) => el.id !== 'typingIndicator')
    .pop() || null;
}

function applyMessageGrouping(el, role, timeMs) {
  const previous = getLastChatMessage();
  if (!previous) return;
  if (previous.dataset.role !== role) return;
  const previousTime = Number(previous.dataset.time || 0);
  if (timeMs - previousTime <= 30000) {
    el.classList.add('grouped');
  }
}

// ---------------------------------------------------------------------------
// Chat UI
// ---------------------------------------------------------------------------

let currentAssistantEl = null;
let currentTextSpan = null;

function resetAssistantStreamingState({ finalize = false, removeCurrent = false } = {}) {
  if (finalize) {
    finalizeAssistantMessage();
    return;
  }

  if (removeCurrent && currentAssistantEl) {
    currentAssistantEl.remove();
  }

  if (currentTextSpan && currentTextSpan._renderTimer) {
    clearTimeout(currentTextSpan._renderTimer);
    currentTextSpan._renderTimer = null;
  }

  currentAssistantEl = null;
  currentTextSpan = null;
}

function abortCurrentResponseUI() {
  removeTypingIndicator();
  resetAssistantStreamingState({ removeCurrent: true });
}

function createAssistantMessage() {
  const timeMs = Date.now();
  const el = document.createElement('div');
  el.className = 'message assistant';
  el._rawText = '';
  el.dataset.role = 'assistant';
  el.dataset.time = String(timeMs);
  applyMessageGrouping(el, 'assistant', timeMs);

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'Claude';
  el.appendChild(label);

  const content = document.createElement('div');
  content.className = 'content';
  el.appendChild(content);

  const timestamp = document.createElement('span');
  timestamp.className = 'timestamp';
  timestamp.textContent = formatTimestamp(new Date(timeMs));
  el.appendChild(timestamp);

  chat.appendChild(el);
  scrollIfAtBottom();
  return el;
}

function ensureAssistantMessage() {
  if (!currentAssistantEl) {
    currentAssistantEl = createAssistantMessage();
  }
  return currentAssistantEl;
}

function ensureCurrentTextSpan() {
  const assistantEl = ensureAssistantMessage();
  if (!currentTextSpan) {
    currentTextSpan = document.createElement('div');
    currentTextSpan.className = 'assistant-text';
    currentTextSpan._rawText = '';
    assistantEl.querySelector('.content').appendChild(currentTextSpan);
  }
  return currentTextSpan;
}

function addMessage(role, text) {
  const timeMs = Date.now();
  const el = document.createElement('div');
  el.className = `message ${role}`;
  el.dataset.role = role;
  el.dataset.time = String(timeMs);
  applyMessageGrouping(el, role, timeMs);

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'You' : 'Claude';
  el.appendChild(label);

  const content = document.createElement('div');
  content.textContent = text;
  el.appendChild(content);

  const timestamp = document.createElement('span');
  timestamp.className = 'timestamp';
  timestamp.textContent = formatTimestamp(new Date(timeMs));
  el.appendChild(timestamp);

  chat.appendChild(el);
  scrollIfAtBottom();
  return el;
}

function appendAssistantChunk(text) {
  const assistantEl = ensureAssistantMessage();
  const textSpan = ensureCurrentTextSpan();
  assistantEl._rawText = (assistantEl._rawText || '') + text;
  textSpan._rawText = (textSpan._rawText || '') + text;
  scheduleRenderMarkdown(textSpan);
  scrollIfAtBottom();
}

function finalizeAssistantMessage() {
  if (currentAssistantEl) {
    currentAssistantEl.querySelectorAll('.assistant-text').forEach((textSpan) => {
      flushRenderMarkdown(textSpan);
    });
    appendMessageCopyButton(currentAssistantEl);
  }
  currentAssistantEl = null;
  currentTextSpan = null;
}

function addErrorMessage(text, showRetry = true) {
  const el = document.createElement('div');
  el.className = 'error-card';
  const retryButton = showRetry
    ? '<button class="retry-btn" type="button" onclick="retryLastMessage()">Retry</button>'
    : '';
  el.innerHTML = `
    <div class="error-card-title">⚠ Error</div>
    <div>${escapeHtml(text || 'Something went wrong.')}</div>
    ${retryButton}
  `;
  chat.appendChild(el);
  scrollIfAtBottom();
}

function scheduleRenderMarkdown(textSpan) {
  if (!textSpan) return;
  if (textSpan._renderTimer) {
    clearTimeout(textSpan._renderTimer);
  }
  textSpan._renderTimer = setTimeout(() => {
    textSpan._renderTimer = null;
    renderMarkdown(textSpan);
  }, 80);
}

function flushRenderMarkdown(textSpan) {
  if (!textSpan) return;
  if (textSpan._renderTimer) {
    clearTimeout(textSpan._renderTimer);
    textSpan._renderTimer = null;
  }
  renderMarkdown(textSpan);
}

function renderMarkdown(textSpan) {
  if (!textSpan) return;
  textSpan.innerHTML = simpleMarkdown(textSpan._rawText || '');
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function plainTextToHtml(text) {
  return escapeHtml(text).replace(/\n/g, '<br>');
}

function formatInlineMarkdown(text) {
  const codeTokens = [];
  let html = text.replace(/`([^`]+)`/g, (_, code) => {
    const token = `__INLINE_CODE_${codeTokens.length}__`;
    codeTokens.push(`<code>${code}</code>`);
    return token;
  });

  html = html.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, label, rawUrl) => {
    const safeUrl = sanitizeLinkUrl(rawUrl);
    if (!safeUrl) {
      return label;
    }
    return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${label}</a>`;
  });
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  codeTokens.forEach((tokenHtml, idx) => {
    html = html.replace(`__INLINE_CODE_${idx}__`, tokenHtml);
  });

  return html;
}

function sanitizeLinkUrl(rawUrl) {
  try {
    const parsed = new URL(rawUrl, window.location.href);
    const allowedProtocols = new Set(['http:', 'https:', 'mailto:']);
    if (!allowedProtocols.has(parsed.protocol)) {
      return null;
    }
    return parsed.href;
  } catch (err) {
    return null;
  }
}

function renderMarkdownLines(text) {
  const lines = text.split('\n');
  const parts = [];
  let inList = false;

  const closeList = () => {
    if (inList) {
      parts.push('</ul>');
      inList = false;
    }
  };

  lines.forEach((line) => {
    if (!line) {
      closeList();
      parts.push('<br>');
      return;
    }

    if (/^__CODE_BLOCK_\d+__$/.test(line)) {
      closeList();
      parts.push(line);
      return;
    }

    const headingMatch = line.match(/^###\s+(.+)$/);
    if (headingMatch) {
      closeList();
      parts.push(`<strong>${formatInlineMarkdown(headingMatch[1])}</strong><br>`);
      return;
    }

    const listMatch = line.match(/^\s*-\s+(.+)$/);
    if (listMatch) {
      if (!inList) {
        parts.push('<ul>');
        inList = true;
      }
      parts.push(`<li>${formatInlineMarkdown(listMatch[1])}</li>`);
      return;
    }

    closeList();
    parts.push(`${formatInlineMarkdown(line)}<br>`);
  });

  closeList();
  return parts.join('');
}

function simpleMarkdown(text) {
  let completeText = text;
  let trailingPlainText = '';
  const fenceMatches = text.match(/```/g);

  if (fenceMatches && fenceMatches.length % 2 === 1) {
    const lastFenceIndex = text.lastIndexOf('```');
    completeText = text.slice(0, lastFenceIndex);
    trailingPlainText = text.slice(lastFenceIndex);
  }

  let html = escapeHtml(completeText);
  const codeBlocks = [];

  html = html.replace(/```([A-Za-z0-9_+-]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const language = lang || '';
    const token = `__CODE_BLOCK_${codeBlocks.length}__`;
    const languageLabel = language ? `<span class="code-lang">${language}</span>` : '';
    codeBlocks.push(
      `<pre class="code-block" data-lang="${language}">${languageLabel}<button class="code-copy-btn" onclick="copyCodeBlock(this)">Copy</button><code>${code}</code></pre>`
    );
    return token;
  });

  html = renderMarkdownLines(html);
  codeBlocks.forEach((blockHtml, idx) => {
    html = html.replace(`__CODE_BLOCK_${idx}__`, blockHtml);
  });

  if (trailingPlainText) {
    html += plainTextToHtml(trailingPlainText);
  }

  return html;
}

function truncateText(value, limit) {
  if (value.length <= limit) return value;
  return value.slice(0, limit) + '\n...';
}

function humanizeToolName(name) {
  const toolNames = {
    Read: 'Read File',
    Edit: 'Edit File',
    Write: 'Write File',
    Bash: 'Run Command',
    Grep: 'Search Code',
    Glob: 'Find Files',
    WebSearch: 'Web Search',
    WebFetch: 'Fetch URL',
  };
  return toolNames[name] || name;
}

function toggleToolCard(el) {
  el.classList.toggle('expanded');
}

function appendToolCard({ id, name, input }) {
  const assistantEl = ensureAssistantMessage();
  flushRenderMarkdown(currentTextSpan);
  currentTextSpan = null;

  const card = document.createElement('div');
  card.className = 'tool-card loading';
  card.dataset.toolId = id;
  card.dataset.toolName = humanizeToolName(name);

  card.innerHTML = `
    <div class="tool-card-header" onclick="toggleToolCard(this.parentElement)">
      <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14.7 6.3a4 4 0 0 0 5 5L22 13.6l-6.4 6.4-4-4L18 9.6l-2.3-2.3Z"></path>
        <path d="m9.6 18-4.2 4.2a1.4 1.4 0 0 1-2-2L7.6 16"></path>
        <path d="m4.5 11.5 8 8"></path>
      </svg>
      <span>${card.dataset.toolName}</span>
      <span class="tool-status">Running...</span>
      <span class="tool-chevron">›</span>
    </div>
    <div class="tool-card-body">
      <pre class="tool-input"></pre>
      <pre class="tool-output"></pre>
    </div>
  `;

  const inputText = truncateText(JSON.stringify(input ?? {}, null, 2), 500);
  card.querySelector('.tool-input').textContent = inputText;

  assistantEl.querySelector('.content').appendChild(card);
  scrollIfAtBottom();
}

function updateToolCard({ id, tool_use_id, content, is_error }) {
  const toolId = id || tool_use_id;
  if (!toolId) return;

  const card = document.querySelector(`[data-tool-id="${CSS.escape(toolId)}"]`);
  if (!card) return;

  card.classList.remove('loading');
  card.classList.add(is_error ? 'error' : 'success');
  card.querySelector('.tool-status').textContent = is_error ? 'Error' : card.dataset.toolName;

  const outputText = typeof content === 'string'
    ? content
    : JSON.stringify(content ?? '', null, 2);
  card.querySelector('.tool-output').textContent = truncateText(outputText, 1000);
}

function appendThinkingBlock({ text }) {
  const assistantEl = ensureAssistantMessage();
  flushRenderMarkdown(currentTextSpan);
  currentTextSpan = null;

  const block = document.createElement('div');
  block.className = 'thinking-block';
  block.innerHTML = `
    <div class="thinking-block-header" onclick="toggleToolCard(this.parentElement)">
      <span class="tool-icon" aria-hidden="true">🧠</span>
      <span>Thinking</span>
      <span class="tool-chevron">›</span>
    </div>
    <div class="thinking-block-body">
      <pre></pre>
    </div>
  `;
  block.querySelector('pre').textContent = text || '';

  assistantEl.querySelector('.content').appendChild(block);
  scrollIfAtBottom();
}

function showTypingIndicator() {
  removeTypingIndicator();

  const el = document.createElement('div');
  el.className = 'message assistant';
  el.id = 'typingIndicator';

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'Claude';
  el.appendChild(label);

  const content = document.createElement('div');
  content.className = 'typing-indicator';
  content.innerHTML = `
    <span class="dots" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </span>
  `;
  el.appendChild(content);

  chat.appendChild(el);
  scrollIfAtBottom();
}

function removeTypingIndicator() {
  const indicator = document.getElementById('typingIndicator');
  if (indicator) {
    indicator.remove();
  }
}

async function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  document.execCommand('copy');
  textarea.remove();
}

function showCopiedState(btn) {
  const originalText = btn.dataset.originalText || btn.textContent;
  btn.dataset.originalText = originalText;
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  window.clearTimeout(btn._copiedTimer);
  btn._copiedTimer = window.setTimeout(() => {
    btn.textContent = originalText;
    btn.classList.remove('copied');
  }, 1500);
}

async function copyCodeBlock(btn) {
  const code = btn.parentElement.querySelector('code');
  if (!code) return;
  try {
    await copyText(code.textContent);
    showCopiedState(btn);
  } catch (err) {
    console.error('Copy failed:', err);
  }
}

function appendMessageCopyButton(messageEl) {
  if (!messageEl || messageEl.querySelector('.message-copy-btn') || !(messageEl._rawText || '')) {
    return;
  }

  const btn = document.createElement('button');
  btn.className = 'message-copy-btn';
  btn.textContent = 'Copy';
  btn.type = 'button';
  btn.setAttribute('onclick', 'copyMessage(this)');
  messageEl.appendChild(btn);
}

async function copyMessage(btn) {
  const messageEl = btn.closest('.message.assistant');
  if (!messageEl || !messageEl._rawText) return;
  try {
    await copyText(messageEl._rawText);
    showCopiedState(btn);
  } catch (err) {
    console.error('Copy failed:', err);
  }
}

// ---------------------------------------------------------------------------
// Status
// ---------------------------------------------------------------------------

function setStatus(state, text) {
  if (statusDot) {
    statusDot.className = 'status-dot ' + state;
    statusDot.title = text;
  }
}

// ---------------------------------------------------------------------------
// Text input
// ---------------------------------------------------------------------------

function sendTextMessage() {
  const text = textInput.value.trim();
  sendMessageText(text);
}

function sendMessageText(text) {
  if (!text && !pendingImages.length) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (sendBtn.dataset.busy === 'true') {
    if (text) queueMessage(text);
    return;
  }
  if (sendBtn.disabled) return;
  lastUserMessage = text;

  // Show in chat immediately
  const msgEl = addMessage('user', text);

  if (pendingImages.length > 0) {
    // Append image thumbnails into the user message bubble
    for (const img of pendingImages) {
      const imgEl = document.createElement('img');
      imgEl.className = 'message-image';
      imgEl.src = `data:${img.media_type};base64,${img.data}`;
      imgEl.alt = img.name;
      msgEl.appendChild(imgEl);
    }
    // Send image message to server
    ws.send(JSON.stringify({
      type: 'image_message',
      text: text || '',
      images: pendingImages.map(i => ({ data: i.data, media_type: i.media_type })),
    }));
    clearPendingImages();
  } else {
    // Send normal text message to server
    ws.send(JSON.stringify({ type: 'text_message', text }));
  }

  // Clear input and mark busy until response completes
  textInput.value = '';
  textInput.style.height = 'auto';
  setSendButtonBusy(true);

  setStatus('processing', 'Processing...');
  hint.textContent = 'Claude is thinking...';
  showTypingIndicator();
}

function retryLastMessage() {
  if (!lastUserMessage) return;
  sendMessageText(lastUserMessage);
}

sendBtn.addEventListener('click', () => {
  if (sendBtn.dataset.busy === 'true') {
    const text = textInput.value.trim();
    if (text) {
      queueMessage(text);
    } else {
      stopTTS();
    }
    return;
  }
  sendTextMessage();
});

textInput.addEventListener('keydown', (evt) => {
  // Send on Enter (not Shift+Enter)
  if (evt.key === 'Enter' && !evt.shiftKey) {
    evt.preventDefault();
    if (sendBtn.dataset.busy === 'true') {
      const text = textInput.value.trim();
      if (text) queueMessage(text);
    } else {
      sendTextMessage();
    }
  }
});

// Escape key stops TTS when a response is in progress
document.addEventListener('keydown', (evt) => {
  if (evt.key === 'Escape' && sendBtn.dataset.busy === 'true') {
    evt.preventDefault();
    stopTTS();
  }
});

// Auto-resize textarea as user types
textInput.addEventListener('input', () => {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
  updateSendButtonState();
});

applyInputMode();

// ---------------------------------------------------------------------------
// Image input — helpers, drag-drop, paste
// ---------------------------------------------------------------------------

/**
 * Read an image File and resolve to {data, media_type, name}.
 * Rejects if type or size is invalid.
 */
function processImageFile(file) {
  return new Promise((resolve, reject) => {
    if (!ALLOWED_IMAGE_TYPES.includes(file.type)) {
      reject(new Error(`Unsupported image type: ${file.type}`));
      return;
    }
    if (file.size > MAX_IMAGE_SIZE) {
      reject(new Error(`Image too large (max 5 MB): ${file.name}`));
      return;
    }
    const reader = new FileReader();
    reader.onload = (evt) => {
      const dataUrl = evt.target.result;
      // dataUrl format: "data:<media_type>;base64,<data>"
      const commaIdx = dataUrl.indexOf(',');
      const base64 = dataUrl.slice(commaIdx + 1);
      resolve({ data: base64, media_type: file.type, name: file.name });
    };
    reader.onerror = () => reject(new Error('Failed to read file'));
    reader.readAsDataURL(file);
  });
}

/** Re-render the pending image thumbnails above the text input. */
function renderImagePreviews() {
  imagePreviewRow.innerHTML = '';
  if (pendingImages.length === 0) {
    imagePreviewRow.style.display = 'none';
    document.getElementById('attachBtn')?.classList.remove('has-images');
    updateSendButtonState();
    return;
  }
  imagePreviewRow.style.display = 'flex';
  document.getElementById('attachBtn')?.classList.add('has-images');
  pendingImages.forEach((img, idx) => {
    const item = document.createElement('div');
    item.className = 'image-preview-item';

    const imgEl = document.createElement('img');
    imgEl.src = `data:${img.media_type};base64,${img.data}`;
    imgEl.alt = img.name;
    item.appendChild(imgEl);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'image-preview-remove';
    removeBtn.type = 'button';
    removeBtn.title = 'Remove image';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => removeImage(idx));
    item.appendChild(removeBtn);

    imagePreviewRow.appendChild(item);
  });
  updateSendButtonState();
}

function removeImage(idx) {
  pendingImages.splice(idx, 1);
  renderImagePreviews();
}

function clearPendingImages() {
  pendingImages = [];
  renderImagePreviews();
}

// Drag-drop: use a counter to handle nested elements
let dragCounter = 0;

document.addEventListener('dragenter', (evt) => {
  const hasImageFiles = Array.from(evt.dataTransfer.items || []).some(
    item => item.kind === 'file' && ALLOWED_IMAGE_TYPES.includes(item.type)
  );
  if (!hasImageFiles) return;
  dragCounter++;
  dropOverlay.classList.add('active');
  evt.preventDefault();
});

document.addEventListener('dragleave', (evt) => {
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove('active');
  }
});

document.addEventListener('dragover', (evt) => {
  evt.preventDefault();
});

document.addEventListener('drop', async (evt) => {
  evt.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');

  const files = Array.from(evt.dataTransfer.files || []).filter(
    f => ALLOWED_IMAGE_TYPES.includes(f.type)
  );

  for (const file of files) {
    try {
      const img = await processImageFile(file);
      pendingImages.push(img);
    } catch (err) {
      console.warn('[bridge] Image drop error:', err.message);
    }
  }
  if (files.length > 0) renderImagePreviews();
});

// Paste: only intercept image items, let text paste through normally
document.addEventListener('paste', async (evt) => {
  const items = Array.from(evt.clipboardData?.items || []).filter(
    item => item.kind === 'file' && ALLOWED_IMAGE_TYPES.includes(item.type)
  );
  if (items.length === 0) return;
  evt.preventDefault();

  for (const item of items) {
    const file = item.getAsFile();
    if (!file) continue;
    try {
      const img = await processImageFile(file);
      pendingImages.push(img);
    } catch (err) {
      console.warn('[bridge] Image paste error:', err.message);
    }
  }
  renderImagePreviews();
});

// File picker button — works on desktop and mobile (opens camera roll / Files)
const attachBtn = document.getElementById('attachBtn');
const imageFileInput = document.getElementById('imageFileInput');

attachBtn.addEventListener('click', () => {
  imageFileInput.value = '';   // reset so same file can be re-selected
  imageFileInput.click();
});

imageFileInput.addEventListener('change', async () => {
  const files = Array.from(imageFileInput.files || []).filter(
    f => ALLOWED_IMAGE_TYPES.includes(f.type)
  );
  for (const file of files) {
    try {
      const img = await processImageFile(file);
      pendingImages.push(img);
    } catch (err) {
      console.warn('[bridge] Image pick error:', err.message);
    }
  }
  if (files.length > 0) renderImagePreviews();
});

// ---------------------------------------------------------------------------
// Session drawer — state and helpers
// ---------------------------------------------------------------------------

let currentSessionId = localStorage.getItem('voiceBridgeSessionId') || null;
let sessions = [];

const drawerOverlay = document.getElementById('drawerOverlay');
const drawerToggle = document.getElementById('drawerToggle');
const newSessionBtn = document.getElementById('newSessionBtn');
const sessionList = document.getElementById('sessionList');

function openDrawer() {
  drawer.classList.add('open');
  drawerOverlay.classList.add('open');
  fetchSessions();
}

function closeDrawer() {
  drawer.classList.remove('open');
  drawerOverlay.classList.remove('open');
}

drawerToggle.addEventListener('click', openDrawer);
drawerOverlay.addEventListener('click', closeDrawer);
newSessionBtn.addEventListener('click', () => {
  newSession();
  closeDrawer();
});

// ---------------------------------------------------------------------------
// Token helper (re-use token already in the page URL)
// ---------------------------------------------------------------------------

function getToken() {
  return new URLSearchParams(window.location.search).get('token') || '';
}

// ---------------------------------------------------------------------------
// Session API helpers
// ---------------------------------------------------------------------------

async function fetchSessions() {
  try {
    const res = await fetch(`/api/sessions?token=${encodeURIComponent(getToken())}`);
    if (!res.ok) return;
    sessions = await res.json();
    renderSessionList();
  } catch (e) {
    // silently ignore — server may not be fully up yet
  }
}

function renderSessionList() {
  sessionList.innerHTML = '';

  if (!sessions || sessions.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'drawer-empty';
    empty.textContent = 'No sessions yet. Start a conversation!';
    sessionList.appendChild(empty);
    return;
  }

  for (const session of sessions) {
    const rawTitle = session.title || session.summary || 'Untitled';
    const title = rawTitle.length > 45 ? rawTitle.slice(0, 42) + '…' : rawTitle;
    const timeStr = relativeTime(session.last_modified);
    const isActive = session.id === currentSessionId;

    const item = document.createElement('div');
    item.className = 'session-item' + (isActive ? ' active' : '');
    item.dataset.sessionId = session.id;

    item.innerHTML = `
      <div class="session-item-row">
        <span class="session-title" title="${escapeHtml(rawTitle)}">${escapeHtml(title)}</span>
        <div class="session-actions">
          <button class="session-action-btn rename" type="button" title="Rename" data-id="${escapeHtml(session.id)}">✏</button>
          <button class="session-action-btn delete" type="button" title="Delete" data-id="${escapeHtml(session.id)}">✕</button>
        </div>
      </div>
      <span class="session-time">${escapeHtml(timeStr)}</span>
    `;

    // Click the item row (not the action buttons) to switch
    item.addEventListener('click', (evt) => {
      if (evt.target.closest('.session-action-btn')) return;
      switchSession(session.id);
      closeDrawer();
    });

    // Rename button
    item.querySelector('.rename').addEventListener('click', (evt) => {
      evt.stopPropagation();
      renameSession(session.id, rawTitle);
    });

    // Delete button
    item.querySelector('.delete').addEventListener('click', (evt) => {
      evt.stopPropagation();
      deleteSession(session.id);
    });

    sessionList.appendChild(item);
  }
}

function relativeTime(timestampMs) {
  if (!timestampMs) return '';
  const diffMs = Date.now() - timestampMs;
  const diffSec = Math.floor(diffMs / 1000);
  if (diffSec < 60) return 'just now';
  const diffMin = Math.floor(diffSec / 60);
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHour = Math.floor(diffMin / 60);
  if (diffHour < 24) return `${diffHour}h ago`;
  const diffDay = Math.floor(diffHour / 24);
  if (diffDay === 1) return 'Yesterday';
  if (diffDay < 7) return `${diffDay}d ago`;
  return new Date(timestampMs).toLocaleDateString([], { month: 'short', day: 'numeric' });
}

// ---------------------------------------------------------------------------
// Session switching
// ---------------------------------------------------------------------------

async function switchSession(sessionId) {
  // Clear current chat UI
  chat.innerHTML = '';
  currentAssistantEl = null;
  currentTextSpan = null;
  removeTypingIndicator();
  // Clear any queued message and invalidate any in-flight drain
  queuedMessage = null;
  queueTurnId++;
  renderQueueBar();
  // Clear any pending images
  clearPendingImages();

  // Update tracked ID and persist
  currentSessionId = sessionId;
  if (sessionId) {
    localStorage.setItem('voiceBridgeSessionId', sessionId);
  } else {
    localStorage.removeItem('voiceBridgeSessionId');
  }

  // Tell the server to switch its Claude session
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'switch_session', session_id: sessionId }));
  }

  // Restore historical messages if resuming an existing session
  if (sessionId) {
    try {
      const res = await fetch(
        `/api/sessions/${encodeURIComponent(sessionId)}/messages?token=${encodeURIComponent(getToken())}`
      );
      if (res.ok) {
        const messages = await res.json();
        restoreMessages(messages);
      }
    } catch (e) {
      // ignore — history is nice-to-have, not critical
    }
  }

  renderSessionList();
}

function newSession() {
  switchSession(null);
}

async function renameSession(sessionId, currentTitle) {
  const newTitle = prompt('Rename session:', currentTitle);
  if (!newTitle || newTitle.trim() === '') return;

  try {
    const res = await fetch(
      `/api/sessions/${encodeURIComponent(sessionId)}?token=${encodeURIComponent(getToken())}`,
      {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle.trim() }),
      }
    );
    if (res.ok) {
      await fetchSessions();
    }
  } catch (e) {
    console.error('Rename failed:', e);
  }
}

async function deleteSession(sessionId) {
  if (!confirm('Delete this session? This cannot be undone.')) return;

  try {
    const res = await fetch(
      `/api/sessions/${encodeURIComponent(sessionId)}?token=${encodeURIComponent(getToken())}`,
      { method: 'DELETE' }
    );
    if (res.ok) {
      // If we deleted the active session, start fresh
      if (sessionId === currentSessionId) {
        newSession();
      }
      await fetchSessions();
    }
  } catch (e) {
    console.error('Delete failed:', e);
  }
}

// ---------------------------------------------------------------------------
// Restore historical messages (same UI model as live messages)
// ---------------------------------------------------------------------------

function restoreMessages(messages) {
  if (!messages || messages.length === 0) return;

  let didCompact = false;
  for (const msg of messages) {
    if (msg.role === 'user') {
      if (msg.text && msg.text.trim()) {
        if (msg.text.startsWith('This session is being continued from a previous conversation')) {
          didCompact = true;
          continue;
        }
        addMessage('user', msg.text);
      }
    } else if (msg.role === 'assistant') {
      if (msg.text || (msg.tool_calls && msg.tool_calls.length > 0)) {
        ensureAssistantMessage();
        ensureCurrentTextSpan();
        if (msg.text) {
          currentTextSpan._rawText = msg.text;
          currentTextSpan.innerHTML = simpleMarkdown(msg.text);
        }
        for (const tc of (msg.tool_calls || [])) {
          if (tc.name && tc.name !== '(result)') {
            appendToolCard({
              id: 'hist-' + Math.random().toString(36).slice(2),
              name: tc.name,
              input: tc.input || {},
            });
          }
        }
        finalizeAssistantMessage();
      }
    }
  }

  if (didCompact) {
    const notice = document.createElement('div');
    notice.className = 'system-notice';
    notice.textContent = 'Context was compacted — earlier messages were summarized.';
    chatMessages.appendChild(notice);
  }

  scrollToBottom();
}
