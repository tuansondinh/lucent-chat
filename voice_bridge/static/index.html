<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Voice Bridge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface-hover: #1a2744;
  --text: #e8e8e8;
  --text-dim: #8b8fa3;
  --accent: #e94560;
  --accent-glow: rgba(233, 69, 96, 0.3);
  --user-bubble: #0f3460;
  --assistant-bubble: #1e2d4a;
  --success: #4ade80;
  --border: #2a2f4a;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 12px;
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
  flex-shrink: 0;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-btn {
  min-width: 42px;
  height: 36px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--surface-hover);
  color: var(--text);
  font-size: 13px;
  padding: 0 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background 0.2s, border-color 0.2s, opacity 0.2s;
}

.topbar-btn.active {
  border-color: var(--accent);
  color: white;
  background: rgba(233, 69, 96, 0.18);
}

.topbar-btn:hover {
  background: #223255;
}


/* Chat area */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
}

.message.grouped {
  margin-top: -8px;
}

.message.grouped .label,
.message.grouped .timestamp {
  display: none;
}

.message {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.5;
  word-break: break-word;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  background: var(--user-bubble);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.message.assistant {
  background: var(--assistant-bubble);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  position: relative;
}

.message .label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.timestamp {
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0.6;
  display: block;
  margin-top: 4px;
}

.message.user .timestamp {
  text-align: right;
}

.system-notice {
  align-self: center;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.7;
  padding: 4px 12px;
  background: var(--surface);
  border-radius: 10px;
  margin: 4px 0;
}

.message.assistant .timestamp {
  text-align: left;
}

.message pre {
  background: rgba(0,0,0,0.3);
  padding: 8px;
  border-radius: 8px;
  overflow-x: auto;
  font-size: 13px;
  margin: 6px 0;
}

.message code {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
}

.content {
  display: flex;
  flex-direction: column;
}

.assistant-text {
  white-space: normal;
}

.assistant-text ul {
  list-style: disc;
  padding-left: 20px;
  margin: 4px 0;
}

.assistant-text a {
  color: var(--accent);
  text-decoration: underline;
}

.message pre.code-block {
  position: relative;
  padding-top: 26px;
}

.code-block {
  position: relative;
}

.code-lang {
  position: absolute;
  top: 4px;
  left: 8px;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.code-copy-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  background: var(--surface-hover);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
}

.code-copy-btn:hover {
  color: var(--text);
  background: var(--surface);
}

.code-copy-btn.copied {
  color: var(--success);
}

.message-copy-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  opacity: 0;
  transition: opacity 0.2s;
  background: var(--surface-hover);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 11px;
  padding: 4px 10px;
}

.message:hover .message-copy-btn,
.message-copy-btn:focus {
  opacity: 1;
}

.message-copy-btn.copied {
  color: var(--success);
}

.tool-card {
  background: var(--surface);
  border-left: 3px solid var(--border);
  padding: 8px 12px;
  margin: 12px 0;
  border-radius: 12px;
}

.tool-card.loading {
  border-left-color: #f59e0b;
  animation: tool-card-pulse 1s infinite;
}

.tool-card.success {
  border-left-color: var(--success);
}

.tool-card.error {
  border-left-color: var(--accent);
}

.tool-card-header {
  display: flex;
  cursor: pointer;
  gap: 8px;
  align-items: center;
  font-size: 13px;
}

.tool-card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s;
}

.tool-card.expanded .tool-card-body {
  max-height: 400px;
  overflow-y: auto;
}

.tool-card-body pre {
  font-size: 13px;
  margin: 4px 0;
  word-break: break-all;
}

.tool-icon {
  width: 16px;
  height: 16px;
  opacity: 0.7;
  flex-shrink: 0;
}

.tool-status {
  font-size: 12px;
  color: var(--text-dim);
}

.tool-chevron {
  margin-left: auto;
  transition: transform 0.2s;
}

.tool-card.expanded .tool-chevron,
.thinking-block.expanded .tool-chevron {
  transform: rotate(90deg);
}

.thinking-block {
  background: var(--surface);
  border-left: 3px dashed var(--text-dim);
  padding: 8px 12px;
  margin: 12px 0;
  border-radius: 12px;
  opacity: 0.8;
}

.thinking-block-header {
  display: flex;
  cursor: pointer;
  gap: 8px;
  align-items: center;
  font-size: 13px;
}

.thinking-block-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s;
}

.thinking-block.expanded .thinking-block-body {
  max-height: 400px;
  overflow-y: auto;
}

.typing-indicator {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.typing-indicator .dots {
  display: inline-flex;
  gap: 4px;
}

.typing-indicator .dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  display: inline-block;
  animation: typing-bounce 0.6s infinite;
}

.typing-indicator .dots span:nth-child(2) {
  animation-delay: 0.15s;
}

.typing-indicator .dots span:nth-child(3) {
  animation-delay: 0.3s;
}

.scroll-down-btn {
  position: fixed;
  left: 50%;
  bottom: calc(124px + env(safe-area-inset-bottom));
  transform: translateX(-50%);
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 4px 16px;
  font-size: 12px;
  cursor: pointer;
  z-index: 10;
  display: none;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
}

.scroll-down-btn.visible {
  display: block;
}

.error-card {
  background: var(--surface);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 10px 14px;
  margin: 8px 0;
  animation: fadeIn 0.2s ease;
}

.error-card-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
}

.error-card .retry-btn,
.reconnect-banner .banner-btn {
  padding: 4px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface-hover);
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
}

.reconnect-banner {
  background: rgba(22, 33, 62, 0.92);
  color: var(--text);
  padding: 8px 16px 10px;
  font-size: 12px;
  display: none;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(233, 69, 96, 0.18);
}

.reconnect-banner.visible {
  display: block;
}

.reconnect-banner-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.reconnect-banner-label {
  color: var(--text-dim);
  letter-spacing: 0.01em;
}

.reconnect-progress {
  margin-top: 8px;
  height: 3px;
  width: 100%;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
}

.reconnect-progress-bar {
  display: block;
  height: 100%;
  width: 36%;
  border-radius: inherit;
  background: linear-gradient(90deg, rgba(233, 69, 96, 0.2), var(--accent), rgba(233, 69, 96, 0.2));
  animation: reconnect-slide 1.1s ease-in-out infinite;
}

.reconnect-banner.manual .reconnect-progress {
  display: none;
}

@keyframes reconnect-slide {
  0% { transform: translateX(-120%); }
  100% { transform: translateX(320%); }
}

.reconnect-toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: #1a1a2e;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 200;
  display: none;
  animation: fadeIn 0.2s ease;
}

.reconnect-toast.visible {
  display: block;
}

@keyframes tool-card-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.65; }
}

@keyframes typing-bounce {
  0%, 100% { transform: translateY(0); opacity: 0.5; }
  50% { transform: translateY(-3px); opacity: 1; }
}

/* Controls */
.controls {
  padding: 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
}

#voiceView {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  margin: 0 auto;
}

.mic-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 3px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  margin: 0 auto;
}

.mic-btn:active, .mic-btn.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 20px var(--accent-glow);
  transform: scale(1.05);
}

.mic-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.mic-btn.active {
  animation: mic-pulse 1.5s infinite;
}

.mic-btn.muted {
  background: #ff4444;
  opacity: 0.6;
}

@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
  50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(233, 69, 96, 0.15); }
}

.control-row {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.stop-btn {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface-hover);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  display: none;
}

.stop-btn.visible { display: block; }

.mode-btn {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface-hover);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.vad-indicator {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.15s;
}

.vad-indicator.active { background: var(--success); }

.hint {
  font-size: 12px;
  color: var(--text-dim);
}

/* Text input */
.text-input-row {
  display: flex;
  width: 100%;
  gap: 8px;
  align-items: flex-end;
}

.composer-vad {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  align-self: center;
  transition: background 0.15s, box-shadow 0.15s;
}

.composer-vad.active {
  background: var(--success);
  box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.18);
}

.text-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  padding: 10px 16px;
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 120px;
  overflow-y: auto;
  line-height: 1.4;
  transition: border-color 0.2s;
}

.text-input:focus {
  border-color: var(--accent);
}

.text-input:disabled {
  opacity: 0.4;
}

.text-input::placeholder {
  color: var(--text-dim);
}

.send-btn {
  min-width: 48px;
  height: 48px;
  border-radius: 24px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  padding: 0 18px;
  gap: 6px;
}

.voice-action-btn {
  min-width: 48px;
  height: 48px;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: var(--surface-hover);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s, opacity 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  padding: 0 16px;
  gap: 6px;
}

.voice-action-btn:hover {
  background: #223255;
}

.voice-action-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.voice-action-btn.recording {
  border-color: var(--accent);
  background: rgba(233, 69, 96, 0.18);
  color: white;
}

.composer-recording-chip {
  display: none;
  width: 100%;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 12px;
  background: rgba(233, 69, 96, 0.12);
  border: 1px solid rgba(233, 69, 96, 0.28);
  color: var(--text);
  font-size: 13px;
}

.composer-recording-chip.visible {
  display: flex;
}

.composer-recording-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.14);
  animation: pulse 1s infinite;
  flex-shrink: 0;
}

.composer-recording-text {
  min-width: 0;
  font-weight: 600;
}

@media (max-width: 640px) {
  .text-input-row {
    gap: 6px;
    align-items: center;
  }

  .composer-vad {
    width: 10px;
    height: 10px;
  }

  .text-input {
    min-width: 0;
    padding: 10px 12px;
    font-size: 14px;
  }

  .voice-action-btn,
  .send-btn {
    min-width: 48px;
    width: 48px;
    padding: 0;
    border-radius: 24px;
    gap: 0;
  }

  .voice-action-label,
  .send-btn-label {
    display: none;
  }

  .voice-action-icon,
  .send-btn-icon {
    font-size: 15px;
  }
}

.send-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.send-btn:not(:disabled):active {
  transform: scale(0.92);
}

.send-btn.stop {
  background: #f59e0b;
}

.send-btn-label {
  font-weight: 600;
}

/* Queue bar */
.queued-bar {
  display: none;
  width: 100%;
}

.queued-bar.visible {
  display: flex;
  flex-direction: row;
  align-items: center;
  background: rgba(15, 52, 96, 0.5);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px 12px;
  font-size: 13px;
  gap: 8px;
  animation: fadeIn 0.2s ease;
}

.queued-bar-icon {
  flex-shrink: 0;
}

.queued-bar-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text);
}

.queued-bar-btn {
  min-width: 28px;
  height: 28px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface-hover);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}

.queued-bar-btn:hover {
  background: #223255;
}

.send-btn.queue {
  background: #3b82f6;
}

/* Loading overlay */
#loading {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 100;
  transition: opacity 0.3s;
}

#loading.hidden {
  opacity: 0;
  pointer-events: none;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ------------------------------------------------------------------ */
/* Drawer — slide-out session list panel                               */
/* ------------------------------------------------------------------ */

.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.drawer-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.drawer {
  position: fixed;
  top: 0;
  left: -280px;
  width: 280px;
  height: 100dvh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 51;
  display: flex;
  flex-direction: column;
  transition: left 0.3s ease;
  overflow: hidden;
}

.drawer.open {
  left: 0;
}

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.drawer-header h2 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.drawer-session-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.session-item {
  display: flex;
  flex-direction: column;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}

.session-item:hover,
.session-item:active {
  background: var(--surface-hover);
}

.session-item.active {
  border-left: 3px solid var(--accent);
  background: rgba(233, 69, 96, 0.06);
  padding-left: 13px;
}

.session-item-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.session-title {
  flex: 1;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

.session-time {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
  flex-shrink: 0;
}

.session-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}

.session-item:hover .session-actions,
.session-item:active .session-actions {
  opacity: 1;
}

.session-action-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;

<script>
// ---------------------------------------------------------------------------
// iOS Audio Unlock — plays a silent buffer via <audio> + AudioContext to
// bypass the mute switch restriction on Web Audio API.
// ---------------------------------------------------------------------------
function unlockiOSAudio() {
  // Create a tiny silent WAV (1 sample, 8kHz, mono, 8-bit)
  const silentWav = new Uint8Array([
    0x52,0x49,0x46,0x46, 0x25,0x00,0x00,0x00, 0x57,0x41,0x56,0x45,
    0x66,0x6D,0x74,0x20, 0x10,0x00,0x00,0x00, 0x01,0x00,0x01,0x00,
    0x40,0x1F,0x00,0x00, 0x40,0x1F,0x00,0x00, 0x01,0x00,0x08,0x00,
    0x64,0x61,0x74,0x61, 0x01,0x00,0x00,0x00, 0x80
  ]);
  const blob = new Blob([silentWav], { type: 'audio/wav' });
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);
  audio.controls = false;
  audio.preload = 'auto';
  audio.loop = false;
  audio.play().then(() => {
    console.log('[bridge] iOS audio unlocked');
    URL.revokeObjectURL(url);
  }).catch(() => {});
}

// Push notification state
let notificationPermissionRequested = false;
let activeNotification = null;

function requestNotificationPermission() {
  if (notificationPermissionRequested || !('Notification' in window)) return;
  notificationPermissionRequested = true;
  if (Notification.permission === 'default') Notification.requestPermission();
}

function notifyIfHidden(body) {
  if (!document.hidden || !('Notification' in window) || Notification.permission !== 'granted') return;
  if (activeNotification) activeNotification.close();
  activeNotification = new Notification('Voice Bridge', {
    body: body || 'Claude has responded',
    tag: 'voice-bridge-response',
  });
  activeNotification.onclick = () => {
    window.focus();
    activeNotification.close();
    activeNotification = null;
  };
}

// Unlock on first user interaction
let audioUnlocked = false;
document.addEventListener('touchstart', function onTouch() {
  if (!audioUnlocked) {
    audioUnlocked = true;
    unlockiOSAudio();
  }
  requestNotificationPermission();
}, { once: true });
document.addEventListener('click', function onClick() {
  if (!audioUnlocked) {
    audioUnlocked = true;
    unlockiOSAudio();
  }
  requestNotificationPermission();
}, { once: true });

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

let ws = null;
let audioCtxCapture = null;
let audioCtxPlayback = null;
let workletNode = null;
let micStream = null;
let isRecording = false;
let recordingGeneration = 0; // incremented to cancel an in-flight startRecording()
let isTTSPlaying = false;
let audioOffMode = localStorage.getItem('voiceBridgeAudioMode') === 'off';

// Always-on mode: mic resumes automatically after TTS playback.
// Push-to-talk mode: user taps mic manually.
// Persisted in localStorage so it survives page reloads (new token URLs).
let alwaysOnMode = localStorage.getItem('voiceBridgeMode') === 'auto';

// Audio playback queue (24kHz Int16LE chunks)
let playbackQueue = [];
let isPlayingAudio = false;
let activeSource = null;  // track playing BufferSource so Stop can kill it
let userScrolledUp = false;
let newContentArrived = false;
let lastUserMessage = '';
let queuedMessage = null;
let queueTurnId = 0;    // monotonic counter, incremented on each queue/session switch
let queuedTurnId = 0;   // turn ID when the current queued message was set
let reconnectAttempts = 0;
let reconnectTimer = null;
let reconnectToastTimer = null;
let wsGeneration = 0;
let wsLeaseHeartbeat = null;
const PLAYBACK_RATE = 24000;
const JITTER_BUFFER_MS = 0;
const WS_OWNER_KEY = 'voiceBridgeWsOwner';
const WS_OWNER_TTL_MS = 5000;
const WS_OWNER_HEARTBEAT_MS = 2000;
const clientId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;

// Image input state
let pendingImages = []; // [{data: base64, media_type: string, name: string}]
const MAX_IMAGE_SIZE = 5 * 1024 * 1024;
const ALLOWED_IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];

// DOM
const chat = document.getElementById('chat');
const micBtn = document.getElementById('micBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const vadIndicator = document.getElementById('vadIndicator');
const textVadIndicator = document.getElementById('textVadIndicator');
const stopBtn = document.getElementById('stopBtn');
const modeBtn = document.getElementById('modeBtn');
const audioToggleBtn = document.getElementById('audioToggleBtn');
const hint = document.getElementById('hint');
const loading = document.getElementById('loading');
const textInput = document.getElementById('textInput');
const pushVoiceBtn = document.getElementById('pushVoiceBtn');
const sendBtn = document.getElementById('sendBtn');
const composerRecordingChip = document.getElementById('composerRecordingChip');
const reconnectBanner = document.getElementById('reconnectBanner');
const reconnectToast = document.getElementById('reconnectToast');
const scrollDownBtn = document.getElementById('scrollDownBtn');
const queuedBar = document.getElementById('queuedBar');
const keyboardBtn = document.getElementById('keyboardBtn');
const modelSelect = document.getElementById('modelSelect');
const dropOverlay = document.getElementById('dropOverlay');
const imagePreviewRow = document.getElementById('imagePreviewRow');
// Drawer elements (defined early so handleMessage can reference them)
const drawer = document.getElementById('drawer');

function updateAudioToggleButton() {
  audioToggleBtn.textContent = audioOffMode ? '🔇' : '🔊';
  audioToggleBtn.title = audioOffMode ? 'Turn audio on' : 'Turn audio off';
  audioToggleBtn.classList.toggle('active', !audioOffMode);
}

function updateSendButtonState() {
  const isBusy = sendBtn.dataset.busy === 'true';
  const label = sendBtn.querySelector('.send-btn-label');
  const icon = sendBtn.querySelector('.send-btn-icon');

  if (isBusy) {
    sendBtn.disabled = false;
    if (textInput.value.trim().length > 0) {
      sendBtn.classList.remove('stop');
      sendBtn.classList.add('queue');
      sendBtn.title = 'Queue message';
      label.textContent = 'Queue';
      icon.textContent = '📨';
    } else {
      sendBtn.classList.remove('queue');
      sendBtn.classList.add('stop');
      sendBtn.title = 'Stop response';
      label.textContent = 'Stop';
      icon.textContent = '■';
    }
    return;
  }

  sendBtn.classList.remove('stop');
  sendBtn.classList.remove('queue');
  sendBtn.title = 'Send message';
  label.textContent = 'Send';
  icon.textContent = '➤';
  const connected = Boolean(ws && ws.readyState === WebSocket.OPEN);
  sendBtn.disabled = !connected || (!textInput.value.trim() && !pendingImages.length);
  document.getElementById('attachBtn').disabled = !connected;
}

function updatePushVoiceButtonState() {
  const canUseVoice = Boolean(ws && ws.readyState === WebSocket.OPEN) && !isTTSPlaying;
  pushVoiceBtn.disabled = !canUseVoice;
  pushVoiceBtn.classList.toggle('recording', isRecording);
  pushVoiceBtn.querySelector('.voice-action-label').textContent = isRecording ? 'Release to stop' : 'Push (hold to talk)';
  pushVoiceBtn.querySelector('.voice-action-icon').textContent = isRecording ? '■' : '🎙';
  composerRecordingChip.classList.toggle('visible', textMode && isRecording);
}

function setSendButtonBusy(isBusy) {
  sendBtn.dataset.busy = isBusy ? 'true' : 'false';
  textInput.placeholder = isBusy ? 'Type a message to queue...' : 'Type a message...';
  updateSendButtonState();
  updatePushVoiceButtonState();
}

function focusTextInputIfVisible() {
  if (!textMode || textInput.disabled) return;
  requestAnimationFrame(() => {
    textInput.focus();
    const end = textInput.value.length;
    textInput.setSelectionRange(end, end);
  });
}

function renderQueueBar() {
  if (!queuedMessage) {
    queuedBar.classList.remove('visible');
    queuedBar.innerHTML = '';
    return;
  }
  const truncated = queuedMessage.length > 60 ? queuedMessage.slice(0, 60) + '…' : queuedMessage;
  queuedBar.innerHTML = `
    <span class="queued-bar-icon">📨</span>
    <span class="queued-bar-text" title="${queuedMessage.replace(/"/g, '&quot;')}">Queued: ${truncated.replace(/</g, '&lt;')}</span>
    <button class="queued-bar-btn" onclick="editQueue()" title="Edit queued message">✏️</button>
    <button class="queued-bar-btn" onclick="clearQueue()" title="Cancel queued message">✕</button>
  `;
  queuedBar.classList.add('visible');
}

function queueMessage(text) {
  queuedMessage = text;
  queueTurnId++;
  queuedTurnId = queueTurnId;
  textInput.value = '';
  textInput.style.height = 'auto';
  renderQueueBar();
  updateSendButtonState();
}

function clearQueue() {
  queuedMessage = null;
  renderQueueBar();
  updateSendButtonState();
  focusTextInputIfVisible();
}

function editQueue() {
  const text = queuedMessage;
  queuedMessage = null;
  renderQueueBar();
  textInput.value = text;
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
  updateSendButtonState();
  focusTextInputIfVisible();
}

function drainQueueIfIdle() {
  if (
    queuedMessage === null ||
    sendBtn.dataset.busy === 'true' ||
    isTTSPlaying ||
    isPlayingAudio ||
    !ws || ws.readyState !== WebSocket.OPEN ||
    queuedTurnId !== queueTurnId
  ) return false;
  const msg = queuedMessage;
  clearQueue();
  sendMessageText(msg);
  return true;
}

function syncModeLabel() {
  modeBtn.textContent = alwaysOnMode ? '🎙 Auto' : '🎙 Push';
}

function readWsOwnerLease() {
  try {
    const raw = localStorage.getItem(WS_OWNER_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (err) {
    return null;
  }
}

function isLeaseStale(lease) {
  return !lease || typeof lease.ts !== 'number' || (Date.now() - lease.ts) > WS_OWNER_TTL_MS;
}

function writeWsOwnerLease() {
  localStorage.setItem(WS_OWNER_KEY, JSON.stringify({ id: clientId, ts: Date.now() }));
}

function clearWsOwnerLease() {
  const lease = readWsOwnerLease();
  if (lease && lease.id === clientId) {
    localStorage.removeItem(WS_OWNER_KEY);
  }
}

function ensureWsOwnership({ force = false } = {}) {
  const lease = readWsOwnerLease();
  if (force || isLeaseStale(lease) || lease.id === clientId) {
    writeWsOwnerLease();
    return true;
  }
  return false;
}

function startWsLeaseHeartbeat() {
  stopWsLeaseHeartbeat();
  writeWsOwnerLease();
  wsLeaseHeartbeat = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    writeWsOwnerLease();
  }, WS_OWNER_HEARTBEAT_MS);
}

function stopWsLeaseHeartbeat() {
  if (wsLeaseHeartbeat) {
    clearInterval(wsLeaseHeartbeat);
    wsLeaseHeartbeat = null;
  }
}

function setPassiveClientState() {
  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
  hideReconnectBanner();
  reconnectAttempts = 0;
  setStatus('', 'Inactive');
  hint.textContent = 'Another tab or PWA instance is active';
  micBtn.disabled = true;
  textInput.disabled = true;
  sendBtn.disabled = true;
  pushVoiceBtn.disabled = true;
  document.getElementById('attachBtn').disabled = true;
}

chat.addEventListener('scroll', () => {
  const atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 50;
  userScrolledUp = !atBottom;
  if (atBottom) {
    newContentArrived = false;
  }
  updateScrollDownButton();
});

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------

function connect() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
    return;
  }
  if (!ensureWsOwnership()) {
    setPassiveClientState();
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const resumeParam = currentSessionId ? `&resume=${encodeURIComponent(currentSessionId)}` : '';
  const url = `${proto}//${location.host}/ws?token=${token}${resumeParam}`;

  const socket = new WebSocket(url);
  const generation = ++wsGeneration;
  ws = socket;
  socket.binaryType = 'arraybuffer';

  socket.onopen = () => {
    if (socket !== ws || generation !== wsGeneration) return;
    startWsLeaseHeartbeat();
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
    if (reconnectAttempts > 0) {
      showReconnectToast();
    }
    reconnectAttempts = 0;
    hideReconnectBanner();
    setStatus('connected', 'Connected');
    updateSendButtonState();
    updatePushVoiceButtonState();
  };

  socket.onmessage = (evt) => {
    if (socket !== ws || generation !== wsGeneration) return;
    if (evt.data instanceof ArrayBuffer) {
      console.log('[bridge] Audio data received:', evt.data.byteLength, 'bytes');
      handleAudioData(evt.data);
    } else if (evt.data instanceof Blob) {
      // Some WebSocket implementations deliver binary as Blob, not ArrayBuffer
      console.log('[bridge] Blob received:', evt.data.size, 'bytes — converting');
      evt.data.arrayBuffer().then(buf => handleAudioData(buf));
    } else {
      try {
        const msg = JSON.parse(evt.data);
        handleMessage(msg);
      } catch(e) {}
    }
  };

  socket.onclose = (evt) => {
    if (socket !== ws || generation !== wsGeneration) return;
    stopWsLeaseHeartbeat();
    ws = null;
    resetAssistantStreamingState({ finalize: true });
    queuedMessage = null;
    renderQueueBar();
    clearPendingImages();
    setStatus('', 'Disconnected');
    micBtn.disabled = true;
    textInput.disabled = true;
    document.getElementById('attachBtn').disabled = true;
    setSendButtonBusy(false);
    updatePushVoiceButtonState();
    sendBtn.disabled = true;
    stopRecording();
    loading.classList.add('hidden');
    removeTypingIndicator();

    // Replaced by a newer connection — go passive, don't fight back.
    if (evt.code === 4002) {
      setPassiveClientState();
      return;
    }
    // Server cooldown — retry once after cooldown expires.
    if (evt.code === 4003) {
      setPassiveClientState();
      reconnectTimer = setTimeout(() => {
        if (!ws || ws.readyState === WebSocket.CLOSED) connect();
      }, 3500);
      return;
    }

    if (!ensureWsOwnership()) {
      setPassiveClientState();
      return;
    }

    reconnectAttempts += 1;
    hint.textContent = 'Connection lost';
    if (reconnectAttempts >= 5) {
      showReconnectBanner(
        `
          <span class="reconnect-banner-label">Unable to connect. Retry manually.</span>
          <button class="banner-btn" type="button" onclick="manualReconnect()">Retry</button>
        `,
        'manual'
      );
      return;
    }

    showReconnectBanner(
      `<span class="reconnect-banner-label">Reconnecting... (${reconnectAttempts}/5)</span>`,
      'loading'
    );
    reconnectTimer = setTimeout(connect, 3000);
  };

  socket.onerror = () => {
    if (socket !== ws || generation !== wsGeneration) return;
    resetAssistantStreamingState({ finalize: true });
  };
}

window.addEventListener('storage', (evt) => {
  if (evt.key !== WS_OWNER_KEY) return;
  const lease = readWsOwnerLease();
  if (lease && lease.id !== clientId) {
    // Another tab claimed ownership — stop heartbeat so our lease expires,
    // but keep the WS alive. The server will send 4002 when that tab connects.
    stopWsLeaseHeartbeat();
    return;
  }

  if ((!lease || lease.id === clientId) && document.visibilityState === 'visible') {
    connect();
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    // Don't force-claim ownership on visibility change — if another instance
    // has a fresh lease, yield to it rather than starting a reconnect fight.
    if (!ws || ws.readyState === WebSocket.CLOSED) {
      if (ensureWsOwnership()) {
        connect();
      }
    }
    // Close any pending notification when the user returns to the tab
    if (activeNotification) { activeNotification.close(); activeNotification = null; }
    return;
  }

  stopWsLeaseHeartbeat();
  clearWsOwnerLease();
});

window.addEventListener('pagehide', () => {
  stopWsLeaseHeartbeat();
  clearWsOwnerLease();
});

function handleMessage(msg) {
  switch (msg.type) {
    case 'ready':
      loading.classList.add('hidden');
      micBtn.disabled = false;
      textInput.disabled = false;
      setSendButtonBusy(false);
      // Sync model dropdown to server's current model
      if (msg.model) modelSelect.value = msg.model;
      // Fetch session list and restore history for the active session
      fetchSessions();
      if (currentSessionId) {
        (async () => {
          try {
            const res = await fetch(
              `/api/sessions/${encodeURIComponent(currentSessionId)}/messages?token=${encodeURIComponent(getToken())}`
            );
            if (res.ok) {
              const messages = await res.json();
              restoreMessages(messages);
            }
          } catch (e) {}
        })();
      }
      // In always-on mode, start mic automatically on connect.
      if (alwaysOnMode && !textMode) {
        startRecording();
      }
      updatePushVoiceButtonState();
      break;

    case 'model_switched':
      modelSelect.value = msg.model;
      setStatus('connected', 'Model: ' + msg.model);
      break;

    case 'session_started':
      // Session file created — update ID and refresh sidebar immediately
      // so the session appears before the response finishes.
      if (msg.session_id && !currentSessionId) {
        currentSessionId = msg.session_id;
        localStorage.setItem('voiceBridgeSessionId', currentSessionId);
      }
      fetchSessions();
      break;

    case 'session_switched':
      currentSessionId = msg.session_id || null;
      if (currentSessionId) {
        localStorage.setItem('voiceBridgeSessionId', currentSessionId);
      } else {
        localStorage.removeItem('voiceBridgeSessionId');
      }
      fetchSessions();
      setStatus('connected', 'Connected');
      break;

    case 'vad_state':
      vadIndicator.classList.toggle('active', msg.speaking);
      textVadIndicator.classList.toggle('active', msg.speaking);
      break;

    case 'transcript':
      lastUserMessage = msg.text;
      addMessage('user', msg.text);
      setStatus('processing', 'Processing...');
      hint.textContent = 'Claude is thinking...';
      setSendButtonBusy(true);
      showTypingIndicator();
      // In push mode, stop recording and flush server-side buffers.
      // In auto mode, keep mic active for barge-in (server gates VAD during TTS).
      if (!alwaysOnMode && isRecording) {
        stopRecording();
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'vad_reset' }));
        }
      }
      break;

    case 'assistant_chunk':
      removeTypingIndicator();
      appendAssistantChunk(msg.text);
      break;

    case 'tool_use_start':
      removeTypingIndicator();
      appendToolCard(msg);
      break;

    case 'tool_result':
      updateToolCard(msg);
      break;

    case 'thinking':
      removeTypingIndicator();
      appendThinkingBlock(msg);
      break;

    case 'assistant_done':
      finalizeAssistantMessage();
      // Capture new session ID from first response in a new session
      if (msg.session_id && !currentSessionId) {
        currentSessionId = msg.session_id;
        localStorage.setItem('voiceBridgeSessionId', currentSessionId);
        fetchSessions();
      } else if (msg.session_id && drawer.classList.contains('open')) {
        // Refresh drawer if open (session title may have updated)
        fetchSessions();
      }
      // Update send button state now that the response is complete
      setSendButtonBusy(isTTSPlaying || isPlayingAudio);
      updatePushVoiceButtonState();
      if (!isTTSPlaying && !isPlayingAudio) {
        focusTextInputIfVisible();
      }
      // Reset status if TTS isn't playing (if TTS is playing,
      // onPlaybackComplete will reset it when audio finishes)
      if (!isTTSPlaying && !isPlayingAudio) {
        setStatus('connected', 'Connected');
        hint.textContent = alwaysOnMode ? 'Speak now' : 'Tap mic to speak';
        if (!queuedMessage) notifyIfHidden('Claude has finished responding');
      }
      drainQueueIfIdle();
      break;

    case 'tts_stop':
      // Server cancelled previous TTS — clear all playback immediately
      abortCurrentResponseUI();
      playbackQueue = [];
      isPlayingAudio = false;
      isTTSPlaying = false;
      stopBtn.classList.remove('visible');
      textInput.disabled = false;
      setSendButtonBusy(false);
      updatePushVoiceButtonState();
      focusTextInputIfVisible();
      break;

    case 'tts_start':
      isTTSPlaying = true;
      stopBtn.classList.add('visible');
      playbackQueue = [];
      isPlayingAudio = false;
      setSendButtonBusy(true);
      // Keep mic active during TTS — server handles barge-in detection.
      // The server gates normal VAD with _tts_active so mic audio during TTS
      // is only used for "stop" keyword detection, not re-submitted as speech.
      break;

    case 'tts_end':
      isTTSPlaying = false;
      if (audioOffMode) {
        playbackQueue = [];
      }
      // Play any remaining buffered audio — onPlaybackComplete fires when done.
      if (playbackQueue.length > 0 && !isPlayingAudio) {
        playBufferedAudio();
      } else if (!isPlayingAudio) {
        // Edge case: tts_end arrived with nothing buffered at all.
        onPlaybackComplete();
      }
      // If isPlayingAudio is true, playBufferedAudio's onended chain will call
      // onPlaybackComplete when the last chunk finishes.
      break;

    case 'error':
      removeTypingIndicator();
      addErrorMessage(msg.text);
      queuedMessage = null;
      renderQueueBar();
      setSendButtonBusy(false);
      updatePushVoiceButtonState();
      focusTextInputIfVisible();
      setStatus('connected', 'Connected');
      hint.textContent = alwaysOnMode ? 'Speak now' : 'Tap to speak';
      break;
  }
}

// ---------------------------------------------------------------------------
// Audio capture (16kHz mono PCM via AudioWorklet)
// ---------------------------------------------------------------------------

async function startRecording() {
  if (isRecording) return;

  // Stamp this invocation so we can detect if stopRecording() was called
  // while we were awaiting getUserMedia / addModule below.
  const generation = ++recordingGeneration;

  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: 16000,
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      }
    });

    // stopRecording() was called while getUserMedia was pending — release the
    // mic track immediately and bail out so the iPhone indicator goes away.
    if (generation !== recordingGeneration) {
      micStream.getTracks().forEach(t => t.stop());
      micStream = null;
      return;
    }

    audioCtxCapture = new AudioContext({ sampleRate: 16000 });

    // Register AudioWorklet processor inline via Blob
    const workletCode = `
      class PCMProcessor extends AudioWorkletProcessor {
        process(inputs) {
          const input = inputs[0];
          if (input && input[0] && input[0].length > 0) {
            // Convert Float32 to Int16
            const float32 = input[0];
            const int16 = new Int16Array(float32.length);
            for (let i = 0; i < float32.length; i++) {
              const s = Math.max(-1, Math.min(1, float32[i]));
              int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            this.port.postMessage(int16.buffer, [int16.buffer]);
          }
          return true;
        }
      }
      registerProcessor('pcm-processor', PCMProcessor);
    `;
    const blob = new Blob([workletCode], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    await audioCtxCapture.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);

    // stopRecording() was called while addModule was pending — clean up everything.
    if (generation !== recordingGeneration) {
      micStream.getTracks().forEach(t => t.stop());
      micStream = null;
      audioCtxCapture.close();
      audioCtxCapture = null;
      return;
    }

    const source = audioCtxCapture.createMediaStreamSource(micStream);
    workletNode = new AudioWorkletNode(audioCtxCapture, 'pcm-processor');

    workletNode.port.onmessage = (evt) => {
      if (isRecording && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(evt.data);
      }
    };

    source.connect(workletNode);
    workletNode.connect(audioCtxCapture.destination); // needed to keep processing

    isRecording = true;
    micBtn.classList.add('active');
    updatePushVoiceButtonState();
    setStatus('recording', 'Listening...');
    hint.textContent = alwaysOnMode
      ? 'Speak now — say Stop to interrupt'
      : 'Speak now — silence ends recording';

  } catch (err) {
    console.error('Mic error:', err);
    addErrorMessage('Microphone access denied. Please allow mic access.', false);
  }
}

function stopRecording() {
  // Always bump the generation so any in-flight startRecording() will abort
  // itself and release the mic — this is what fixes the "mic stuck on" bug
  // where the user releases PTT before the async getUserMedia/addModule finish.
  recordingGeneration++;
  if (!isRecording) return;

  isRecording = false;
  micBtn.classList.remove('active');
  updatePushVoiceButtonState();

  if (workletNode) {
    workletNode.disconnect();
    workletNode = null;
  }
  if (audioCtxCapture) {
    audioCtxCapture.close();
    audioCtxCapture = null;
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
}

// Toggle recording on mic button click
micBtn.addEventListener('click', () => {
  // Create playback AudioContext on first user gesture (iOS requirement)
  if (!audioCtxPlayback || audioCtxPlayback.state === 'closed') {
    audioCtxPlayback = new AudioContext({ sampleRate: PLAYBACK_RATE });
  }
  // Also unlock iOS audio on this user gesture
  if (!audioUnlocked) {
    audioUnlocked = true;
    unlockiOSAudio();
  }

  if (alwaysOnMode) {
    // In auto mode, mic button acts as mute/unmute
    if (isRecording) {
      stopRecording();
      setStatus('connected', 'Muted');
      hint.textContent = 'Mic muted — tap to unmute';
      micBtn.classList.add('muted');
    } else {
      startRecording();
      micBtn.classList.remove('muted');
    }
  } else {
    // Push-to-talk: toggle recording
    if (isRecording) {
      stopRecording();
      // Flush server-side audio buffers to prevent stale audio
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'vad_reset' }));
      }
      setStatus('connected', 'Connected');
      hint.textContent = 'Tap mic to speak';
    } else {
      startRecording();
    }
  }
});

function beginPushVoiceCapture() {
  if (!ws || ws.readyState !== WebSocket.OPEN || isTTSPlaying) return;

  if (alwaysOnMode) {
    alwaysOnMode = false;
    localStorage.setItem('voiceBridgeMode', 'push');
    syncModeLabel();
  }

  if (isRecording) {
    return;
  }

  ws.send(JSON.stringify({ type: 'push_to_talk_start' }));
  startRecording();
}

function endPushVoiceCapture() {
  if (!isRecording) return;
  stopRecording();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'push_to_talk_end' }));
  }
  setStatus('connected', 'Connected');
  hint.textContent = 'Tap mic to speak';
}

pushVoiceBtn.addEventListener('pointerup', (evt) => {

});

pushVoiceBtn.addEventListener('pointercancel', () => {
  endPushVoiceCapture();
});

pushVoiceBtn.addEventListener('lostpointercapture', () => {

});

pushVoiceBtn.addEventListener('pointerleave', (evt) => {
